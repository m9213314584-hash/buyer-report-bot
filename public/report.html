<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Отчёт закупщика / 采购员日报</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F7F6F3; --surface: #FFFFFF; --border: #E2E0D9; --border-strong: #C8C5BC;
    --text: #1A1916; --text-2: #5C5A54; --text-3: #9B9890;
    --accent: #1A6B3C; --accent-bg: #EAF4EE; --accent-border: #A8D4B8;
    --danger: #B83232; --danger-bg: #FBF0F0;
    --warning-bg: #FDF6E7; --warning: #8A6200; --warning-border: #E8D5A0;
    --success-bg: #EAF4EE; --success: #1A6B3C; --success-border: #A8D4B8;
    --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,0.07);
  }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,'PingFang SC','Helvetica Neue',Arial,sans-serif; font-size:14px; line-height:1.6; padding:24px 16px 60px; }

  .page-header { max-width:720px; margin:0 auto 24px; display:flex; align-items:center; gap:14px; }
  .header-logo img { border-radius:10px; }
  .brand-name { font-size:13px; font-weight:700; color:var(--accent); letter-spacing:0.04em; text-transform:uppercase; margin-bottom:1px; }

  .header-icon { width:44px; height:44px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:22px; }
  .header-text h1 { font-size:18px; font-weight:600; line-height:1.3; }
  .header-text p { font-size:13px; color:var(--text-3); margin-top:2px; }
  .container { max-width:720px; margin:0 auto; }
  .buyer-card { background:var(--surface); border:1px solid var(--accent-border); border-radius:12px; padding:16px; margin-bottom:20px; box-shadow:var(--shadow); display:flex; align-items:center; gap:14px; }
  .buyer-avatar { width:44px; height:44px; border-radius:50%; background:var(--accent); color:#fff; font-size:18px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; text-transform:uppercase; }
  .buyer-field { flex:1; }
  .buyer-field label { font-size:12px; font-weight:600; color:var(--text-2); display:block; margin-bottom:4px; }
  .buyer-field input { width:100%; background:#FAFAF8; border:1px solid var(--border-strong); border-radius:var(--radius); padding:8px 12px; font-size:14px; color:var(--text); font-family:inherit; outline:none; transition:border-color .15s,box-shadow .15s; }
  .buyer-field input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(26,107,60,.1); background:#fff; }
  .supplier-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; margin-bottom:16px; box-shadow:var(--shadow); overflow:hidden; }
  .card-head { display:flex; align-items:center; justify-content:space-between; padding:12px 16px; background:#FAFAF8; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; }
  .card-head-left { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .card-num { width:26px; height:26px; border-radius:50%; background:var(--accent); color:#fff; font-size:12px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .card-title { font-size:14px; font-weight:600; }
  .badge { font-size:11px; padding:2px 9px; border-radius:99px; font-weight:500; }
  .badge-tbd    { background:#F0EFEB; color:#6B6963; border:1px solid #DDD9D1; }
  .badge-ok     { background:var(--success-bg); color:var(--success); border:1px solid var(--success-border); }
  .badge-order  { background:#EAF1FB; color:#1A4F8A; border:1px solid #B0CBF0; }
  .badge-sample { background:#F0EAFB; color:#5B2DA0; border:1px solid #C8B0F0; }
  .badge-fail   { background:var(--danger-bg); color:var(--danger); border:1px solid #F0C0C0; }
  .badge-wait   { background:var(--warning-bg); color:var(--warning); border:1px solid var(--warning-border); }
  .badge-prog   { background:#E8F4FF; color:#0A5FA0; border:1px solid #A8D0F0; }
  .card-actions { display:flex; align-items:center; gap:8px; }
  .btn-icon { width:28px; height:28px; border-radius:6px; border:1px solid var(--border); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-3); font-size:16px; flex-shrink:0; }
  .btn-icon:hover { background:var(--danger-bg); color:var(--danger); border-color:#F0C0C0; }
  .chevron { transition:transform .2s; font-style:normal; font-size:14px; color:var(--text-3); }
  .chevron.open { transform:rotate(180deg); }
  .card-body { padding:16px; display:none; }
  .card-body.open { display:block; }
  .sec { margin-bottom:16px; }
  .sec-label { font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.07em; color:var(--text-3); margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border); }
  .divider { height:1px; background:var(--border); margin:16px 0; }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .field { display:flex; flex-direction:column; gap:4px; }
  .field label { font-size:12px; color:var(--text-2); font-weight:500; line-height:1.4; }
  .field label .cn { color:var(--text-3); font-weight:400; }
  .field input,.field select,.field textarea { background:#FAFAF8; border:1px solid var(--border-strong); border-radius:var(--radius); padding:7px 10px; font-size:13px; color:var(--text); font-family:inherit; outline:none; transition:border-color .15s,box-shadow .15s; width:100%; }
  .field input:focus,.field select:focus,.field textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(26,107,60,.1); background:#fff; }
  .field textarea { resize:vertical; min-height:64px; line-height:1.6; }
  .catalog-list { display:flex; flex-direction:column; gap:6px; }
  .catalog-row { display:flex; align-items:center; gap:8px; }
  .catalog-row .name-input { flex:1; }
  .catalog-row .url-input { flex:2; }
  .open-link { font-size:12px; padding:6px 10px; border-radius:6px; background:var(--accent-bg); border:1px solid var(--accent-border); color:var(--accent); text-decoration:none; white-space:nowrap; flex-shrink:0; display:flex; align-items:center; gap:4px; }
  .open-link.disabled { background:#F0EFEB; border-color:var(--border); color:var(--text-3); pointer-events:none; }
  .status-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
  .status-opt { border:1px solid var(--border); border-radius:var(--radius); padding:9px 10px; cursor:pointer; transition:border-color .12s,background .12s; }
  .status-opt:hover,.status-opt.sel { border-color:var(--accent); background:var(--accent-bg); }
  .status-opt .ico { font-size:16px; margin-bottom:3px; }
  .status-opt .lbl { font-size:12px; font-weight:600; line-height:1.3; }
  .status-opt .sub { font-size:10px; color:var(--text-3); margin-top:1px; }
  .rating-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .rating-item { display:flex; flex-direction:column; gap:4px; }
  .rlabel { font-size:12px; font-weight:500; color:var(--text-2); line-height:1.4; }
  .rlabel .cn { color:var(--text-3); font-weight:400; }
  .stars { display:flex; gap:3px; margin-top:1px; }
  .star { font-size:20px; cursor:pointer; color:#DDD9D1; transition:color .1s; }
  .star.lit { color:#D4900A; }
  .tag-wrap { display:flex; flex-wrap:wrap; gap:5px; margin-top:4px; }
  .tag { font-size:12px; padding:3px 10px; border-radius:99px; border:1px solid var(--border-strong); cursor:pointer; color:var(--text-2); background:#FAFAF8; transition:all .1s; line-height:1.5; }
  .tag.active { background:var(--danger-bg); border-color:#F0C0C0; color:var(--danger); }
  .steps-list { display:flex; flex-direction:column; gap:6px; }
  .step-row { display:flex; align-items:center; gap:8px; }
  .step-row .step-input { flex:1; }
  .step-row .date-input { width:140px; flex-shrink:0; }
  .btn-add { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:500; color:var(--accent); border:1px dashed var(--accent-border); background:var(--accent-bg); border-radius:6px; padding:5px 12px; cursor:pointer; margin-top:6px; }
  .btn-add-supplier { display:flex; align-items:center; justify-content:center; gap:8px; font-size:14px; font-weight:500; color:var(--accent); border:1.5px dashed var(--accent-border); background:var(--accent-bg); border-radius:12px; padding:14px; cursor:pointer; margin-bottom:20px; }
  .btn-add-supplier:hover { background:#D8EEE2; }
  .btn-del { width:28px; height:28px; border-radius:6px; flex-shrink:0; border:1px solid #F0C0C0; background:var(--danger-bg); color:var(--danger); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .global-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:20px; box-shadow:var(--shadow); }
  .submit-area { display:flex; flex-direction:column; gap:10px; }
  .submit-btn { width:100%; padding:13px; font-size:15px; font-weight:600; background:var(--accent); color:#fff; border:none; border-radius:10px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; font-family:inherit; }
  .submit-btn:hover { background:#155C32; }
  .submit-btn:disabled { background:#9B9890; cursor:not-allowed; }
  .status-msg { text-align:center; font-size:13px; padding:10px; border-radius:8px; display:none; }
  .status-msg.sending { display:block; background:var(--warning-bg); color:var(--warning); border:1px solid var(--warning-border); }
  .status-msg.success { display:block; background:var(--success-bg); color:var(--success); border:1px solid var(--success-border); }
  .status-msg.error   { display:block; background:var(--danger-bg); color:var(--danger); border:1px solid #F0C0C0; }
  @media(max-width:600px){.grid-2,.grid-3{grid-template-columns:1fr}.status-grid{grid-template-columns:1fr 1fr}.rating-grid{grid-template-columns:1fr 1fr}.step-row .date-input{width:110px}}
</style>
</head>

  </div>

    <button class="submit-btn" id="send-btn" onclick="sendReport()">
      📊 Отправить отчёт в Telegram / 发送报告到Telegram
    </button>
    <div class="status-msg" id="status-msg"></div>
  </div>
</div>
<script>
const d = new Date();
document.getElementById('date-line').textContent = d.toLocaleDateString('ru-RU',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
const DATE_STR = d.toLocaleDateString('ru-RU');
function updateAvatar(v){ document.getElementById('avatar').textContent = v?v.trim()[0].toUpperCase():'?'; }
let count=0;
const STATUSES=[
  {key:'prog',  lbl:'В процессе / 谈判中',          sub:'Переговоры идут / 正在谈判',         badge:'badge-prog',   icon:'⏳'},
  {key:'ok',    lbl:'Договорились / 已达成协议',     sub:'Условия согласованы / 条件已确认',   badge:'badge-ok',     icon:'✅'},
  {key:'order', lbl:'Заказ размещён / 已下订单',     sub:'Предоплата внесена / 已支付预付款',  badge:'badge-order',  icon:'📄'},
  {key:'sample',lbl:'Образцы запрошены / 已申请样品',sub:'Ожидаем доставку / 等待发货',        badge:'badge-sample', icon:'📦'},
  {key:'fail',  lbl:'Отказали / 谈判失败',           sub:'Не договорились / 未能达成协议',     badge:'badge-fail',   icon:'❌'},
  {key:'wait',  lbl:'Требует уточнения / 待确认',    sub:'Нужен доп. запрос / 需要进一步确认', badge:'badge-wait',   icon:'❓'},
];
const ISSUES=['Брак / качество / 质量问题','Задержка сроков / 交货延迟','Завышенная цена / 价格过高','Проблемы с MOQ / 起订量问题','Нет нужного товара / 无所需商品','Языковой барьер / 语言障碍','Отказ в образцах / 拒绝提供样品','Сомнительный поставщик / 供应商可疑','Проблемы с оплатой / 付款问题','Нет документов / 无相关文件'];
const RATINGS=[['Качество товара','商品质量'],['Надёжность','可靠性'],['Гибкость цены','价格灵活性'],['Коммуникация','沟通能力']];
function addSupplier(){
  count++;const id=count;
  const card=document.createElement('div');card.className='supplier-card';card.id='card-'+id;
  const statusHTML=STATUSES.map(s=>`<div class="status-opt" onclick="selectStatus(${id},'${s.badge}','${s.lbl}',this)"><div class="ico">${s.icon}</div><div class="lbl">${s.lbl}</div><div class="sub">${s.sub}</div></div>`).join('');
  const ratingHTML=RATINGS.map(([ru,cn],ri)=>`<div class="rating-item"><div class="rlabel">${ru} <span class="cn">/ ${cn}</span></div><div class="stars" id="stars-${id}-${ri}">${[1,2,3,4,5].map(v=>`<span class="star" onclick="setStar(${id},${ri},${v})">★</span>`).join('')}</div></div>`).join('');
  const issueHTML=ISSUES.map(i=>`<span class="tag" onclick="this.classList.toggle('active')">${i}</span>`).join('');
  card.innerHTML=`<div class="card-head" onclick="toggleCard(${id})"><div class="card-head-left"><div class="card-num">${id}</div><div class="card-title" id="title-${id}">Поставщик ${id} / 供应商 ${id}</div><span class="badge badge-tbd" id="badge-${id}">Не заполнено</span></div><div class="card-actions"><button class="btn-icon" onclick="event.stopPropagation();removeCard(${id})">✕</button><i class="chevron open" id="chev-${id}">▾</i></div></div>
  <div class="card-body open" id="body-${id}">
    <div class="sec"><div class="sec-label">🏪 Поставщик / 供应商信息</div>
      <div class="grid-3" style="margin-bottom:10px">
        <div class="field"><label>Название / контакт <span class="cn">/ 名称·联系方式</span></label><input type="text" id="name-${id}" placeholder="Alibaba / WeChat" oninput="updateTitle(${id},this.value)"></div>
        <div class="field"><label>Товар <span class="cn">/ 商品</span></label><input type="text" id="goods-${id}" placeholder="Наушники TWS / 蓝牙耳机"></div>
        <div class="field"><label>Категория <span class="cn">/ 类别</span></label><input type="text" id="cat-${id}" placeholder="Электроника / 电子产品"></div>
      </div>
      <div class="grid-3">
        <div class="field"><label>Цена за ед. (¥) <span class="cn">/ 单价</span></label><input type="number" id="price-${id}" placeholder="45.00"></div>
        <div class="field"><label>MOQ (шт.) <span class="cn">/ 最小起订量</span></label><input type="number" id="moq-${id}" placeholder="500"></div>
        <div class="field"><label>Срок производства <span class="cn">/ 生产周期</span></label><input type="text" id="lead-${id}" placeholder="14 дней / 14天"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="sec"><div class="sec-label">🔗 Каталоги / 供应商目录链接</div>
      <div class="catalog-list" id="catalogs-${id}">
        <div class="catalog-row"><input type="text" class="field name-input" placeholder="Название / 名称"><input type="url" class="field url-input" placeholder="https://..." oninput="updateLink(this)"><a class="open-link disabled" href="#" target="_blank">↗ Открыть</a><button class="btn-del" onclick="this.closest('.catalog-row').remove()">✕</button></div>
      </div>
      <button class="btn-add" onclick="addCatalog(${id})">＋ Каталог / 添加目录</button>
    </div>
    <div class="divider"></div>
    <div class="sec"><div class="sec-label">📋 Итог переговоров / 谈判结果</div>
      <div class="status-grid">${statusHTML}</div>
      <div class="field" style="margin-top:10px"><label>Комментарий <span class="cn">/ 备注</span></label><textarea id="status-note-${id}" placeholder="Детали договорённости… / 协议详情…"></textarea></div>
    </div>
    <div class="divider"></div>
    <div class="sec"><div class="sec-label">⭐ Оценка поставщика / 供应商评分</div><div class="rating-grid">${ratingHTML}</div></div>
    <div class="divider"></div>
    <div class="sec"><div class="sec-label">⚠️ Выявленные проблемы / 发现的问题</div>
      <div class="tag-wrap">${issueHTML}</div>
      <div class="field" style="margin-top:10px"><label>Описание <span class="cn">/ 详细说明</span></label><textarea id="issues-note-${id}" placeholder="Подробности… / 问题详情…"></textarea></div>
    </div>
    <div class="divider"></div>
    <div class="sec"><div class="sec-label">➡ Следующие шаги / 下一步行动</div>
      <div class="steps-list" id="steps-${id}">
        <div class="step-row"><input type="text" class="step-input" placeholder="Что сделать / 待办事项"><input type="date" class="date-input"><button class="btn-del" onclick="this.closest('.step-row').remove()">✕</button></div>
      </div>
      <button class="btn-add" onclick="addStep(${id})">＋ Шаг / 添加步骤</button>
    </div>
  </div>`;
  document.getElementById('suppliers').appendChild(card);
}
function toggleCard(id){const b=document.getElementById('body-'+id),c=document.getElementById('chev-'+id),o=b.classList.contains('open');b.classList.toggle('open',!o);c.classList.toggle('open',!o);}
function removeCard(id){const e=document.getElementById('card-'+id);if(e)e.remove();}
function updateTitle(id,v){document.getElementById('title-'+id).textContent=v?v+' / 供应商':('Поставщик '+id+' / 供应商 '+id);}
function selectStatus(id,bc,lbl,el){el.closest('.status-grid').querySelectorAll('.status-opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');const b=document.getElementById('badge-'+id);b.className='badge '+bc;b.textContent=lbl.split('/')[0].trim();}
function setStar(cid,ri,v){document.getElementById('stars-'+cid+'-'+ri).querySelectorAll('.star').forEach((s,i)=>s.classList.toggle('lit',i<v));}
function updateLink(input){const v=input.value.trim(),a=input.closest('.catalog-row').querySelector('.open-link');if(v.startsWith('http')){a.href=v;a.classList.remove('disabled');}else{a.href='#';a.classList.add('disabled');}}
function addCatalog(id){const r=document.createElement('div');r.className='catalog-row';r.innerHTML=`<input type="text" class="field name-input" placeholder="Название / 名称"><input type="url" class="field url-input" placeholder="https://..." oninput="updateLink(this)"><a class="open-link disabled" href="#" target="_blank">↗ Открыть</a><button class="btn-del" onclick="this.closest('.catalog-row').remove()">✕</button>`;document.getElementById('catalogs-'+id).appendChild(r);}
function addStep(id){const r=document.createElement('div');r.className='step-row';r.innerHTML=`<input type="text" class="step-input" placeholder="Что сделать / 待办事项"><input type="date" class="date-input"><button class="btn-del" onclick="this.closest('.step-row').remove()">✕</button>`;document.getElementById('steps-'+id).appendChild(r);}
function collectData(){
  const cards=document.querySelectorAll('.supplier-card');
  return [...cards].map(card=>{
    const id=card.id.replace('card-','');
    const v=k=>(document.getElementById(k+'-'+id)||{}).value||'';
    const sel=card.querySelector('.status-opt.sel');
    const catalogs=[...card.querySelectorAll('.catalog-row')].map(r=>({name:(r.querySelector('.name-input')||{}).value||'',url:(r.querySelector('.url-input')||{}).value||''})).filter(c=>c.name||c.url);
    const issues=[...card.querySelectorAll('.tag.active')].map(t=>t.textContent);
    const ratings=RATINGS.map((_,ri)=>{const stars=document.getElementById('stars-'+id+'-'+ri);if(!stars)return null;return stars.querySelectorAll('.star.lit').length||null;});
    const steps=[...card.querySelectorAll('.step-row')].map(r=>({text:(r.querySelector('.step-input')||{}).value||'',date:(r.querySelector('.date-input')||{}).value||''}));
    return {name:v('name'),goods:v('goods'),category:v('cat'),price:v('price'),moq:v('moq'),leadTime:v('lead'),catalogs,status:sel?sel.querySelector('.lbl').textContent:'',statusNote:v('status-note'),ratings,issues,issuesNote:v('issues-note'),steps};
  });
}
async function sendReport(){
  const name=document.getElementById('buyer-name').value.trim();
  if(!name){alert('Введите ваше имя / 请输入您的姓名');document.getElementById('buyer-name').focus();return;}
  if(!document.querySelectorAll('.supplier-card').length){alert('Добавьте хотя бы одного поставщика / 请至少添加一个供应商');return;}
  const btn=document.getElementById('send-btn'),msg=document.getElementById('status-msg');
  btn.disabled=true;msg.className='status-msg sending';msg.textContent='⏳ Формируем Excel и отправляем… / 正在生成Excel并发送…';
  try{
    const res=await fetch('/send-report',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({buyerName:name,date:DATE_STR,suppliers:collectData(),globalComment:document.getElementById('global-comment').value})});
    const json=await res.json();
    if(!json.ok)throw new Error(json.error||'Server error');
    msg.className='status-msg success';
    msg.textContent='✅ Отчёт отправлен в Telegram и сохранён в Google Sheets! / 报告已发送到Telegram并保存到Google表格！';
  }catch(e){
    msg.className='status-msg error';msg.textContent='❌ Ошибка отправки. Проверьте соединение. / 发送失败，请检查网络连接。';
    console.error(e);
  }finally{btn.disabled=false;}
}
addSupplier();
</script>
</body>
</html>
