<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SendMax — Портал закупщика</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F6F3; --surface: #FFFFFF; --border: #E2E0D9;
  --text: #1A1916; --text-2: #5C5A54; --text-3: #9B9890;
  --accent: #1A6B3C; --accent-bg: #EAF4EE; --accent-border: #A8D4B8;
  --radius: 8px; --shadow: 0 1px 3px rgba(0,0,0,0.07);
}
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  padding: 24px 16px;
}
.wrap { max-width: 480px; width: 100%; }
.header { text-align: center; margin-bottom: 36px; }
.logo { width: 64px; height: 64px; border-radius: 16px; margin: 0 auto 14px; display: block; }
.brand { font-size: 13px; font-weight: 700; color: var(--accent); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
.title { font-size: 22px; font-weight: 600; line-height: 1.3; }
.title-cn { font-size: 15px; color: var(--text-3); margin-top: 4px; }
.date { font-size: 12px; color: var(--text-3); margin-top: 8px; }

.menu { display: flex; flex-direction: column; gap: 14px; }
.menu-btn {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px 22px;
  display: flex; align-items: center; gap: 16px;
  text-decoration: none; color: var(--text);
  box-shadow: var(--shadow); transition: border-color .15s, box-shadow .15s;
  cursor: pointer;
}
.menu-btn:hover { border-color: var(--accent-border); box-shadow: 0 2px 8px rgba(26,107,60,.12); }
.menu-icon {
  width: 52px; height: 52px; border-radius: 12px;
  background: var(--accent-bg); border: 1px solid var(--accent-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 26px; flex-shrink: 0;
}
.menu-text { flex: 1; }
.menu-title { font-size: 16px; font-weight: 600; line-height: 1.3; }
.menu-title-cn { font-size: 13px; color: var(--text-3); margin-top: 2px; }
.menu-desc { font-size: 12px; color: var(--text-2); margin-top: 6px; line-height: 1.5; }
.menu-arrow { color: var(--text-3); font-size: 18px; flex-shrink: 0; }

.footer { text-align: center; margin-top: 32px; font-size: 12px; color: var(--text-3); }
</style>
</head>
